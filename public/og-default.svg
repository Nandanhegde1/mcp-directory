  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="80" y="280" font-family="Inter, system-ui, sans-serif" font-size="84" font-weight="800" fill="white">MCP Directory</text>
  <text x="80" y="360" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="500" fill="#cbd5e1">Every Model Context Protocol server.</text>
  <text x="80" y="410" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="500" fill="url(#accent)">Indexed weekly. Free forever.</text>
